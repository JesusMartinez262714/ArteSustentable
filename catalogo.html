<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Arte Sustentable</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="body-catalogo"> <!-- Mantiene el fondo.png en imagenes/ -->
    <header class="navbar">
        <div class="logo"><a href="index.html">Arte Sustentable</a></div>
        <nav><ul class="nav-links"></ul></nav>
    </header>

    <!-- Usamos el nuevo contenedor extenso -->
    <main class="contenedor-catalogo-extenso">
        <div class="seccion-blanca">
            <h2 style="color: var(--bosque); margin-bottom: 20px; text-align: center;">Explora las Ideas</h2>
            
            <div class="filtros" style="display: flex; gap: 10px; margin-bottom: 25px; justify-content: center;">
                <input type="text" id="buscar-texto" placeholder="Buscar por nombre o material..." onkeyup="filtrar()" style="max-width: 400px;">
                <select id="filtro-nivel" onchange="filtrar()" style="max-width: 200px;">
                    <option value="todos">Todos los niveles</option>
                    <option value="Primaria">Primaria</option>
                    <option value="Secundaria">Secundaria</option>
                    <option value="Preparatoria">Preparatoria</option>
                    <option value="Universidad">Universidad</option>
                </select>
            </div>

            <!-- Contenedor de la cuadrícula horizontal -->
            <div id="contenedor-catalogo" class="grid-proyectos">
                <!-- Se llena con js/catalogo.js -->
            </div>
        </div>
    </main>

    <script src="js/db.js"></script>
    <script src="js/catalogo.js"></script>
    <script src="js/estado-sesion.js"></script>
</body>
</html>
