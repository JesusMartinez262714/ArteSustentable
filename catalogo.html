<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Arte Sustentable</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header class="navbar">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">Arte Sustentable</a></div>
        <div class="logo">Catálogo</div>
        <nav><ul class="nav-links"></ul></nav>
    </header>

    <main class="contenedor">
        <div class="filtros" style="margin-bottom:20px; display:flex; gap:10px;">
            <input type="text" id="buscar-texto" placeholder="Buscar..." onkeyup="filtrar()">
            <select id="filtro-nivel" onchange="filtrar()">
                <option value="todos">Todos</option>
                <option value="Primaria">Primaria</option>
                <option value="Secundaria">Secundaria</option>
                <option value="Preparatoria">Preparatoria</option>
                <option value="Universidad">Universidad</option>
            </select>
        </div>
        <div id="contenedor-catalogo" class="grid-proyectos"></div>
    </main>

    <script src="js/db.js"></script>
    <script src="js/catalogo.js"></script>
    <script src="js/proteccion.js"></script>
    <script src="js/estado-sesion.js"></script>
</body>
</html>
